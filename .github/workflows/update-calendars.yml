name: Update AFL Calendars

on:
  schedule:
    - cron: "0 * * * *"   # every hour (adjust to taste; min is "*/5")
  workflow_dispatch:       # manual trigger from Actions tab

permissions:
  contents: write          # allow the job to push back to the repo

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Debug raw JSON
        run: node -e "fetch('https://fixturedownload.com/feed/json/afl-2026/melbourne',{headers:{'User-Agent':'afl-ical-bot/1.0'}}).then(r=>r.json()).then(d=>console.log(JSON.stringify(d[0],null,2)))"

      - name: Generate all team .ics files
        run: npm run build

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/

          # Only commit when there are actual changes
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            git commit -m "chore: update ics files — ${TIMESTAMP}"
            git pull --rebase
            git push
          fi
