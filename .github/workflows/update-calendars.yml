name: Update AFL Calendars

on:
  schedule:
    - cron: "0 * * * *"   # every hour (adjust to taste; min is "*/5")
  workflow_dispatch:       # manual trigger from Actions tab

permissions:
  contents: write          # allow the job to push back to the repo

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --omit=dev || npm install --omit=dev

      - name: Generate melbourne.ics
        run: npm run build
        # To generate all 18 teams instead, replace with: npm run build:all

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/

          # Only commit when there are actual changes
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            git commit -m "chore: update ics files — ${TIMESTAMP}"
            git push
          fi
