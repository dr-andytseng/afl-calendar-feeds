name: Build & Update AFL Calendars

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    outputs:
      pushed: ${{ steps.push.outputs.pushed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build melbourne.ics
        run: npm run build:melbourne

      - name: Commit docs if changed
        id: push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git status --porcelain | grep -q docs/; then
            git add docs
            git commit -m "chore: update calendars — $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git push
            echo "pushed=true" >> $GITHUB_OUTPUT
          else
            echo "pushed=false" >> $GITHUB_OUTPUT
          fi

  ensure-pages:
    needs: build-and-commit
    runs-on: ubuntu-latest
    steps:
      - name: Wait briefly for GitHub to register the push
        if: needs.build-and-commit.outputs.pushed == 'true'
        run: sleep 8

      - name: Trigger Pages deployment (no-op checkout)
        uses: actions/checkout@v4
